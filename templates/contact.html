{% extends "base.html" %}

{% block content %}
<div class="section-container" style="min-height: 70vh;">
    <h2 class="section-title">Get in Touch</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start;">
        <div>
            <p style="font-size: 1.1rem; color: #555; margin-bottom: 40px;">Ready to scale? Our enterprise consultants will reach out within 24 hours.</p>
            
            <form action="https://formspree.io/f/mzdwvqnj" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
                <input type="text" name="name" placeholder="Full Name" required style="padding: 15px; border: 1px solid #ddd; border-radius: 4px;">
                <input type="email" name="email" placeholder="Business Email" required style="padding: 15px; border: 1px solid #ddd; border-radius: 4px;">
                <select name="service" required style="padding: 15px; border: 1px solid #ddd; border-radius: 4px; background: white;">
                    <option value="" disabled selected>Service Needed</option>
                    <option value="shopify-setup">Shopify Store Setup & Migration</option>
                    <option value="data-entry">High-Volume Data Entry</option>
                    <option value="web-dev">Custom Web Development</option>
                    <option value="amazon-fba">Amazon FBA Management & PPC</option>
                    <option value="listing-optimization">E-commerce Listing Optimization</option>
                </select>
                <textarea name="message" placeholder="Tell us about your project" rows="5" style="padding: 15px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
                <button type="submit" class="btn-primary">Send Inquiry</button>
            </form>
        </div>
        <div style="background: #f8fafb; padding: 50px; border-radius: 8px;">
            <h3 style="color: var(--brand-main); margin-top: 0;">Our Headquarters</h3>
            <p style="color: #666;">Pune, Maharashtra, India</p>
        </div>
    </div>
</div>
{% endblock %}
